spring:
  datasource:
    url: jdbc:tc:postgresql:15-alpine:///core_banking_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  flyway:
    enabled: true
    clean-disabled: false

  rabbitmq:
    listener:
      simple:
        auto-startup: false # Don't start listeners by default in tests

  data:
    redis:
      host: localhost
      port: 6379
