server:
  port: 8080

spring:
  application:
    name: core-banking-api

  # ---------------------------------------------------------------------------
  # Java 21 Virtual Threads — delegates Tomcat's request handling to loom
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: true

  # ---------------------------------------------------------------------------
  # DataSource — PostgreSQL
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:banking}
    username: ${POSTGRES_USER:banking}
    password: ${POSTGRES_PASSWORD:banking}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BankingHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ---------------------------------------------------------------------------
  # Flyway — database migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ---------------------------------------------------------------------------
  # Redis — idempotency cache
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ---------------------------------------------------------------------------
  # RabbitMQ — AMQP broker
  # ---------------------------------------------------------------------------
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10

# ---------------------------------------------------------------------------
# Actuator — health, info, and Prometheus metrics
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# ---------------------------------------------------------------------------
# OpenAPI / Swagger UI
# ---------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

# ---------------------------------------------------------------------------
# Banking domain configuration
# ---------------------------------------------------------------------------
banking:
  idempotency:
    ttl-hours: 24

  outbox:
    relay:
      fixed-delay-ms: 5000

  rabbitmq:
    exchange: banking.events
    queue:
      notification: notification.queue
      fraud-check: fraud-check.queue
    routing-key:
      transaction-completed: transaction.completed
